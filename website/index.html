<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AI Blog Generator</title>

    <link rel="stylesheet"
          href="css/main.css">

    <link rel="stylesheet"
          href="css/glass.css">

</head>

<body>

    <div class="background-blur"></div>

    <header class="hero">

        <div class="hero-content">

            <span class="badge">
                AI Powered
            </span>

            <h1>
                Developer Insights
            </h1>

            <p>
                Automated technology articles generated from trending developer discussions.
            </p>

        </div>

    </header>

    <section class="search-section">

        <input
            id="searchInput"
            type="text"
            placeholder="Search articles..."
        >

    </section>

    <section class="posts-section">

        <div
            id="postsContainer"
            class="posts-grid"
        ></div>

    </section>

    <script src="js/search.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
